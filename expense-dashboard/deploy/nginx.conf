# Nginx server block for ledger.jjaguilar.dev.
#
# This is the HTTP-only starting point. Run `certbot --nginx` (see
# PROJECT_NOTES.md's Day 23 entry / the deploy walkthrough) to obtain a
# certificate - certbot edits this file in place to add the HTTPS server
# block and the 80->443 redirect, so don't hand-write those here first.
#
# Adjust `root` below if the app isn't cloned to /var/www/ledger.

server {
    listen 80;
    listen [::]:80;
    server_name ledger.jjaguilar.dev;

    root /var/www/ledger/expense-dashboard/public;
    index index.php;

    charset utf-8;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.4-fpm.sock;
    }

    # Never serve dotfiles (.env, .git, etc.) even if something ends up
    # inside the document root by mistake.
    location ~ /\. {
        deny all;
    }

    client_max_body_size 20M;

    access_log /var/log/nginx/ledger.access.log;
    error_log  /var/log/nginx/ledger.error.log;
}
